name: PythonWorkflow

on:
  push:
env:
  VENV: /home/rogal/projekty/rogalTasks/backend/venv
jobs:
  test:
    runs-on: self-hosted
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          cd backend
          if [ ! -d "$VENV" ]; then
            python3 -m venv "$VENV"
          fi
          "$VENV/bin/python" -m pip install -r requirements.txt
      - name: Ruff
        run: |
          cd backend
          "$VENV/bin/python" -m ruff check . --fix
          "$VENV/bin/python" -m ruff format
      - name: Tests
        run: |
          cd backend
          "$VENV/bin/python" -m pytest tests.py
          
    
    

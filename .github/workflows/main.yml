name: PythonWorkflow

on:
  push:

jobs:
  test:
    runs-on: self-hosted
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          cd backend
          if [ ! -d venv ]; then
            python3 -m venv venv
          fi
          source venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Tests
        run: |
          cd backend
          source venv/bin/activate
          pytest tests.py
          
    
    
